name: CI

on:
  push:
    branches:
      - homologacao
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validar estrutura para Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar arquivos estaticos
        run: |
          test -f index.html
          test -f organizador-rotas.html
          test -d css
          test -d js
