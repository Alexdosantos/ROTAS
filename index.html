<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Login - Organizador de Rotas</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card">
    <div class="header">
      <div class="logo">📦</div>
      <h1>Rotas <span>Login</span></h1>
      <p class="subtitle">Bem-vindo de volta!</p>
    </div>

    <div class="error-message" id="errorMessage">E-mail ou senha incorretos.</div>

    <form id="loginForm">
      <div class="form-group">
        <label class="label">E-mail</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="seu@email.com" required>
          <span class="input-icon">✉</span>
        </div>
      </div>

      <div class="form-group">
        <label class="label">Senha</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" required>
          <span class="input-icon">🔒</span>
        </div>
      </div>

      <div class="options">
        <label class="remember-me">
          <input type="checkbox"> Lembrar de mim
        </label>
        <a href="#" class="forgot-password">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
    </form>

    <p class="footer-text">Não tem uma conta? <a href="#">Cadastre-se</a></p>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
